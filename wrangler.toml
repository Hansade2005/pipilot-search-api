name = "pipilot-search-api"
main = "src/index.ts"
compatibility_date = "2024-03-01"
node_compat = true

# KV Namespaces (will be created on first deploy)
[[kv_namespaces]]
binding = "CACHE"
id = "" # Will be auto-generated on deploy

[[kv_namespaces]]
binding = "API_KEYS"
id = "" # Will be auto-generated on deploy

[vars]
ENVIRONMENT = "production"
VERSION = "1.0.0"

# Limits
# Free tier: 100,000 requests/day
# Paid tier ($5/mo): 10M requests/month
