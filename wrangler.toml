name = "pipilot-search-api"
main = "src/index.ts"
compatibility_date = "2024-03-01"
node_compat = true

# KV Namespaces
[[kv_namespaces]]
binding = "CACHE"
id = "85ddd583a15a4e13b05026900ca9e642"

[[kv_namespaces]]
binding = "API_KEYS"
id = "e3b571cde10d48e38fdb107e0b9e2911"

[vars]
ENVIRONMENT = "production"
VERSION = "1.0.0"
# Add your Supabase URL here (get from Supabase Dashboard → Settings → API)
SUPABASE_URL = "https://your-project.supabase.co"

# IMPORTANT: SUPABASE_SERVICE_KEY is a secret!
# Don't add it here. Instead, run this command:
# npx wrangler secret put SUPABASE_SERVICE_KEY
# Then paste your Supabase service role key when prompted

# Limits
# Free tier: 100,000 requests/day
# Paid tier ($5/mo): 10M requests/month
